[profile.default]
src = "src"
out = "out"
libs = ["lib"]
ignored_error_codes = [6546, 5856]
solc_version = "0.8.24"

remappings = [
  "@openzeppelin-contracts@4.8.3/=lib/openzeppelin-contracts-4.8.3/contracts/",
  "@chainlink-local/=lib/chainlink-local/",
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "@ccip/=lib/ccip/"
]

via_ir = true
optimizer = false

# 🌟 Bypasses the CBOR/IPFS pairing mismatch perfectly
cbor_metadata = false
bytecode_hash = "none"

# 🌟 Standalone global section stays at the absolute bottom
[rpc_endpoints]
sepolia = "https://eth-sepolia.g.alchemy.com/v2/xGqPsM-3_Nu7aSh8uEaq5"
arb-sepolia = "https://arb-sepolia.g.alchemy.com/v2/xGqPsM-3_Nu7aSh8uEaq5"